<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- O robô vai ler a página, mas o redirecionamento só acontece após 3 segundos -->
    <meta http-equiv="refresh" content="3; url=https://wa.me/5518996246483?text=Ol%C3%A1%2C%20quero%20as%20tabelas%20de%20valores.">
    <title>TYRIS Agência - Conectando...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .loader {
            border: 4px solid #333;
            border-top: 4px solid #25D366;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 { font-size: 24px; margin-bottom: 10px; }
        p { color: #aaa; font-size: 16px; }
    </style>
    <script>
        // Redirecionamento forçado por JavaScript após 3000 milissegundos (3 segundos)
        setTimeout(function() {
            window.location.href = "https://wa.me/5518996246483?text=Ol%C3%A1%2C%20quero%20as%20tabelas%20de%20valores.";
        }, 3000);
    </script>
</head>
<body>

    <div class="loader"></div>
    <h1>Quase lá...</h1>
    <p>Estamos conectando você ao nosso atendimento no WhatsApp.</p>

</body>
</html>
