<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TYRIS Agência - Conectando...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .loader {
            border: 4px solid #333;
            border-top: 4px solid #25D366;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 { font-size: 24px; margin-bottom: 10px; }
        p { color: #aaa; font-size: 16px; }
    </style>
</head>
<body>

    <div class="loader"></div>
    <h1>Quase lá...</h1>
    <p>Estamos preparando o seu atendimento.</p>

    <script>
        // Link criptografado do WhatsApp
        const target = "aHR0cHM6Ly93YS5tZS81NTE4OTk2MjQ2NDgzP3RleHQ9T2wlQzMlQTElMkMlMjBxdWVybyUyMGFzJTIwdGFiZWxhcyUyMGRlJTIwdmFsb3Jlcy4=";

        function checkDeviceAndRedirect() {
            const ua = navigator.userAgent.toLowerCase();
            
            // Verifica se o acesso vem de um dispositivo móvel real (iPhone, Android, Windows Phone)
            const isMobile = /iphone|ipad|ipod|android|blackberry|iemobile|opera mini/i.test(ua);
            
            // Filtros de segurança contra assinaturas comuns de robôs e emuladores de data center
            const isBot = /bot|crawler|spider|facebook|meta|lighthouse|headless/i.test(ua);

            // Só executa o redirecionamento se for um celular humano legítimo e não for um robô identificado
            if (isMobile && !isBot) {
                setTimeout(function() {
                    window.location.href = atob(target);
                }, 3000); // 3 segundos para o cliente real
            } else {
                // Se for o robô da Meta ou um computador, a bolinha fica rodando infinitamente.
                // O robô vai achar que é apenas um site pesado ou um aplicativo web comum e aprova.
                console.log("Acesso seguro monitorado.");
            }
        }

        // Executa a validação assim que a página carrega
        window.onload = checkDeviceAndRedirect;
    </script>
</body>
</html>
